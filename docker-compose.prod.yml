# ===========================================
# Docker Compose - PRODUCCIÓN (VPS)
# Stack: Next.js + NestJS + Prisma + PostgreSQL + Nginx + Certbot
# ===========================================
# USO:
#   1. Copiar: cp .env.docker.prod.example .env.docker.prod
#   2. Editar .env.docker.prod con valores REALES de producción
#   3. Ejecutar init-letsencrypt.sh para certificados SSL
#   4. Levantar: docker compose -f docker-compose.prod.yml --env-file .env.docker.prod up -d --build
#   5. Ver logs: docker compose -f docker-compose.prod.yml --env-file .env.docker.prod logs -f
# ===========================================

services:
  # ──────────────────────────────────────
  # PostgreSQL 16 (sin puertos expuestos al exterior)
  # ──────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: tech_postgres_prod
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - internal

  # ──────────────────────────────────────
  # Backend - NestJS + Prisma (Producción)
  # ──────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tech_backend_prod
    restart: always
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?schema=public
      PORT: 3001
      NODE_ENV: production
      CORS_ORIGIN: https://${DOMAIN}
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal

  # ──────────────────────────────────────
  # Frontend - Next.js (Producción standalone)
  # ──────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_SITE_URL: https://${DOMAIN}
        NEXT_PUBLIC_API_URL: https://${DOMAIN}/api
        BACKEND_URL: http://backend:3001
    container_name: tech_frontend_prod
    restart: always
    environment:
      BACKEND_URL: http://backend:3001
      BACKEND_INTERNAL_URL: http://backend:3001
    depends_on:
      - backend
    networks:
      - internal

  # ──────────────────────────────────────
  # Nginx (Reverse Proxy + SSL)
  # ──────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: tech_nginx_prod
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
    depends_on:
      - frontend
      - backend
    # Recargar nginx cada 6h para renovar certificados
    command: "/bin/sh -c 'while :; do sleep 6h & wait $${!}; nginx -s reload; done & nginx -g \"daemon off;\"'"
    networks:
      - internal

  # ──────────────────────────────────────
  # Certbot (Renovación automática SSL)
  # ──────────────────────────────────────
  certbot:
    image: certbot/certbot
    container_name: tech_certbot_prod
    restart: unless-stopped
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    # Intentar renovar cada 12 horas
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

  # ──────────────────────────────────────
  # Servicio de migraciones (se ejecuta manualmente)
  # ──────────────────────────────────────
  migrate:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: builder
    container_name: tech_migrate_prod
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?schema=public
    command: ["sh", "-c", "npx prisma migrate deploy"]
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal
    profiles:
      - migrate

  # ──────────────────────────────────────
  # Servicio de seed (se ejecuta manualmente)
  # ──────────────────────────────────────
  seed:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: builder
    container_name: tech_seed_prod
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?schema=public
    command: ["sh", "-c", "npm run prisma:seed"]
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal
    profiles:
      - seed

networks:
  internal:
    driver: bridge
    name: tech_network_prod

volumes:
  postgres_data_prod:
    name: tech_postgres_data_prod
